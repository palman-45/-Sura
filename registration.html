<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Academy - Student Registration</title>
    <style>
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8; /* Very light cool grey */
            color: #333;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
        }

        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        
        header {
            background-color: #333; 
            color: #fff;
            padding: 15px 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            transition: color 0.2s;
        }

        nav a:hover {
            color: #add8e6; 
        }

        
        main {
            flex-grow: 1; 
            display: flex;
            justify-content: center;
            align-items: center; 
            padding: 40px 0;
        }

        .form-section {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 500px; 
        }

        h2.form-title {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
        }

        
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #3498db; 
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }
    options-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 5px;
        }

        .options-group label {
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;}

        
        .submit-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: #3498db; /* Modern Blue */
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #2980b9; 
        }
    
.back-home {
    position: absolute;
    top: 20px;
    left: 20px;
    text-decoration: none;
    color: #333;
    font-size: 0.9rem;
    font-weight: bold;
    background: rgba(255, 255, 255, 0.8);
    padding: 8px 15px;
    border-radius: 20px;
    border: 1px solid #ddd;
    transition: 0.3s;
    z-index: 1000; /* Makes sure it stays on top of everything */
}

.back-home:hover {
    background: #0000ff;
    color: #fff;
    border-color: #0000ff;
}

        footer {
            background-color: #222; 
            color: #bbb;
            text-align: center;
            padding: 20px 0;
            font-size: 14px;
        }

        
        @media (min-width: 768px) {
            main {
                padding: 60px 0; 
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="home.html">Home</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="registration.html">Student</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container form-container">
            <div class="form-section">
                <h2 class="form-title">Student Registration Form</h2>
                
                <form action="home.html" method="post">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" name="firstName" placeholder="e.g. John" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" name="lastName" placeholder="e.g. Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="e.g. john.doe@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="grade">Grade Level</label>
                        <select id="grade" name="grade">
                            <option value="">Select Grade</option>
                            <option value="9">Grade 9</option>
                            <option value="10">Grade 10</option>
                            <option value="11">Grade 11</option>
                            <option value="12">Grade 12</option>
                        </select>
                    </div>


                    <button type="submit" class="submit-btn">Submit</button>
                    <a href="home.html" class="back-home">← Back to Home</a>

                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Falcon Academy | Written by Surafel | All rights reserved</p>
        </div>
    </footer>

</body>
</html>
